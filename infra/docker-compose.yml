version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: psych_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-psych_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psych_pass}
      POSTGRES_DB: ${POSTGRES_DB:-psych_rag}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psych_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: psych_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: psych_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334

  langfuse:
    image: langfuse/langfuse:2
    container_name: psych_langfuse
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-psych_user}:${POSTGRES_PASSWORD:-psych_pass}@postgres:5432/${POSTGRES_DB:-psych_rag}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-langfuse_secret_change_me}
      NEXTAUTH_URL: http://localhost:3001
      SALT: ${LANGFUSE_SALT:-salt_change_me}

  prometheus:
    image: prom/prometheus:latest
    container_name: psych_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:latest
    container_name: psych_grafana
    depends_on:
      - prometheus
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: psych_api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    env_file:
      - ../apps/api/.env
    volumes:
      - ../apps/api:/app
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: psych_celery_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../apps/api/.env
    volumes:
      - ../apps/api:/app
      - uploads_data:/app/uploads
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: psych_celery_beat
    depends_on:
      - redis
    env_file:
      - ../apps/api/.env
    volumes:
      - ../apps/api:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: psych_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  uploads_data:
