version: "3.9"

# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  nginx:
    image: nginx:alpine
    container_name: psych_nginx
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: always

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      DEBUG: "false"

  celery_worker:
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=8
    restart: always
    deploy:
      replicas: 2

  celery_beat:
    restart: always

  web:
    restart: always

  postgres:
    restart: always

  redis:
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_in_prod}

  qdrant:
    restart: always

volumes:
  uploads_data:
